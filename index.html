<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenCorn — AI Film Studio</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0d0d0f;
        --bg-secondary: #16161a;
        --bg-tertiary: #1e1e24;
        --bg-card: #1a1a20;
        --border: #2a2a32;
        --text-primary: #e8e6e3;
        --text-secondary: #94949a;
        --text-muted: #5a5a62;
        --accent: #e85d26;
        --accent-hover: #f06b33;
        --success: #3ecf6a;
        --error: #e84040;
        --warning: #e8b826;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
          sans-serif;
        font-size: 14px;
        color: var(--text-primary);
        background: var(--bg-primary);
      }

      html,
      body,
      #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/renderer/index.tsx"></script>
  </body>
</html>
