<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenCorn — AI Film Studio</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        /* Backgrounds */
        --bg-primary: #0a0a0c;
        --bg-secondary: #121215;
        --bg-tertiary: #1a1a1f;
        --bg-card: #16161b;
        --bg-elevated: #1e1e24;
        --bg-overlay: rgba(0, 0, 0, 0.6);

        /* Borders */
        --border: #252530;
        --border-subtle: #1e1e28;
        --border-focus: #e85d26;

        /* Text */
        --text-primary: #ece9e5;
        --text-secondary: #8a8a94;
        --text-muted: #50505a;
        --text-inverse: #0a0a0c;

        /* Accent — cinematic orange */
        --accent: #e85d26;
        --accent-hover: #f47038;
        --accent-muted: rgba(232, 93, 38, 0.15);
        --accent-glow: rgba(232, 93, 38, 0.25);

        /* Status */
        --success: #34d058;
        --success-muted: rgba(52, 208, 88, 0.12);
        --error: #ea4a4a;
        --error-muted: rgba(234, 74, 74, 0.12);
        --warning: #e3b341;
        --warning-muted: rgba(227, 179, 65, 0.12);

        /* Shadows */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);

        /* Typography */
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
          sans-serif;
        --font-mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;

        /* Spacing */
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;

        /* Transitions */
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        --duration-fast: 120ms;
        --duration-normal: 200ms;

        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.5;
        color: var(--text-primary);
        background: var(--bg-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      html,
      body,
      #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      /* Dark scrollbars */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }
      ::-webkit-scrollbar-corner {
        background: transparent;
      }

      /* Selection */
      ::selection {
        background: var(--accent-muted);
        color: var(--text-primary);
      }

      /* Focus ring */
      :focus-visible {
        outline: 2px solid var(--border-focus);
        outline-offset: 2px;
      }

      /* Smooth transitions on interactive elements */
      button,
      input,
      textarea,
      select {
        transition: all var(--duration-fast) var(--ease-out);
      }

      /* Placeholder text */
      ::placeholder {
        color: var(--text-muted);
        opacity: 1;
      }

      /* Textarea resize handle */
      textarea {
        resize: vertical;
      }

      /* Video element */
      video {
        background: #000;
      }

      /* Range slider styling */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        border-radius: 2px;
        background: var(--bg-tertiary);
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        border: 2px solid var(--bg-primary);
        box-shadow: 0 0 4px var(--accent-glow);
      }
      input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        border: 2px solid var(--bg-primary);
        box-shadow: 0 0 4px var(--accent-glow);
      }

      /* Select dropdown styling */
      select {
        -webkit-appearance: none;
        appearance: none;
        background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2350505a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 10px center;
        padding-right: 28px !important;
      }

      /* High contrast mode */
      [data-high-contrast="true"] {
        --bg-primary: #000000;
        --bg-secondary: #0a0a0a;
        --bg-tertiary: #141414;
        --bg-card: #0e0e0e;
        --bg-elevated: #1c1c1c;
        --border: #3a3a3a;
        --border-subtle: #2a2a2a;
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --text-muted: #707070;
        --accent: #ff6b35;
        --accent-hover: #ff8555;
        --accent-muted: rgba(255, 107, 53, 0.2);
        --success: #44e070;
        --error: #ff5555;
        --warning: #ffcc00;
      }

      /* Screen reader only */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* Animations */
      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }

      @keyframes toast-in {
        from {
          opacity: 0;
          transform: translateX(20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes slide-in-right {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <script>
      // Restore high contrast preference before paint
      try {
        if (localStorage.getItem("opencorn-high-contrast") === "true") {
          document.documentElement.setAttribute("data-high-contrast", "true");
        }
      } catch {}
    </script>
    <div id="root"></div>
    <script type="module" src="index.js"></script>
  </body>
</html>
