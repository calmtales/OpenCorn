<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenCorn — AI Film Studio</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        /* Backgrounds */
        --bg-primary: #0a0a0c;
        --bg-secondary: #121215;
        --bg-tertiary: #1a1a1f;
        --bg-card: #16161b;
        --bg-elevated: #1e1e24;
        --bg-overlay: rgba(0, 0, 0, 0.6);

        /* Borders */
        --border: #252530;
        --border-subtle: #1e1e28;
        --border-focus: #e85d26;

        /* Text */
        --text-primary: #ece9e5;
        --text-secondary: #8a8a94;
        --text-muted: #50505a;
        --text-inverse: #0a0a0c;

        /* Accent — cinematic orange */
        --accent: #e85d26;
        --accent-hover: #f47038;
        --accent-muted: rgba(232, 93, 38, 0.15);
        --accent-glow: rgba(232, 93, 38, 0.25);

        /* Status */
        --success: #34d058;
        --success-muted: rgba(52, 208, 88, 0.12);
        --error: #ea4a4a;
        --error-muted: rgba(234, 74, 74, 0.12);
        --warning: #e3b341;
        --warning-muted: rgba(227, 179, 65, 0.12);

        /* Shadows */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);

        /* Typography */
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
          sans-serif;
        --font-mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;

        /* Spacing */
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;

        /* Transitions */
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        --duration-fast: 120ms;
        --duration-normal: 200ms;

        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.5;
        color: var(--text-primary);
        background: var(--bg-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      html,
      body,
      #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      /* Dark scrollbars */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }
      ::-webkit-scrollbar-corner {
        background: transparent;
      }

      /* Selection */
      ::selection {
        background: var(--accent-muted);
        color: var(--text-primary);
      }

      /* Focus ring */
      :focus-visible {
        outline: 2px solid var(--border-focus);
        outline-offset: 2px;
      }

      /* Smooth transitions on interactive elements */
      button,
      input,
      textarea,
      select {
        transition: all var(--duration-fast) var(--ease-out);
      }

      /* Placeholder text */
      ::placeholder {
        color: var(--text-muted);
        opacity: 1;
      }

      /* Textarea resize handle */
      textarea {
        resize: vertical;
      }

      /* Video element */
      video {
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/renderer/index.tsx"></script>
  </body>
</html>
